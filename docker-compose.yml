services:
  glm52-v12:
    image: ${IMAGE:-voipmonitor/vllm:glm52-dark-devotion-release-vllmec65667-b12xaaf1891-scale-fix-cu132-20260622}
    container_name: ${NAME:-glm52-v12}
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: 32g
    privileged: true
    gpus: all
    init: true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 1048576
        hard: 1048576
      stack: 67108864
    volumes:
      - ${MODEL_HOST_PATH:-/mnt/models/GLM-5.2-NVFP4}:${MODEL:-/models/GLM-5.2-NVFP4}:ro
      - ${HF_CACHE:-/mnt/models/huggingface}:/root/.cache/huggingface
      - ${CACHE_ROOT:-/mnt/models/vllm-glm52-v12-cache}:/cache
      - ${LMCACHE_HOST_PATH:-/mnt/lmcache-l2/l2}:${GLM52_LMCACHE_DISK_PATH:-/lmcache/l2}
      - ${LMCACHE_TMP_HOST_PATH:-/mnt/lmcache-l2/tmp}:/lmcache/tmp
      - ./serve_glm52_v12.sh:/opt/serve_glm52_v12.sh:ro
      - ./patches/patch_kv_xfer_assert_v10.py:/opt/patch_kv_xfer_assert_v10.py:ro
      - ./patches/patch_fs_l2_adapter.py:/opt/patch_fs_l2_adapter.py:ro
      - ./patches/patch_l1_evict_flush_to_l2.py:/opt/patch_l1_evict_flush_to_l2.py:ro
      - ./patches/patch_preempt_safe_restore.py:/opt/patch_preempt_safe_restore.py:ro
      - ./patches/patch_dcp_lmcache.py:/opt/patch_dcp_lmcache.py:ro
      - ./patches/patch_dcp_mla_store.py:/opt/patch_dcp_mla_store.py:ro
      - ./patches/patch_odirect_aligned.py:/opt/patch_odirect_aligned.py:ro
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_DEVICE_MAX_CONNECTIONS: "32"
      CUTE_DSL_ARCH: sm_120a
      OMP_NUM_THREADS: "16"
      # Do NOT set PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True with LMCache MP.
      SAFETENSORS_FAST_GPU: "1"
      NCCL_IB_DISABLE: "1"
      NCCL_P2P_LEVEL: SYS
      NCCL_PROTO: LL,LL128,Simple
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      VLLM_USE_AOT_COMPILE: "1"
      VLLM_USE_BREAKABLE_CUDAGRAPH: "0"
      VLLM_USE_MEGA_AOT_ARTIFACT: "1"
      VLLM_USE_FLASHINFER_SAMPLER: "1"
      VLLM_USE_B12X_FP8_GEMM: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_USE_B12X_SPARSE_INDEXER: "1"
      VLLM_USE_V2_MODEL_RUNNER: "1"
      VLLM_ENABLE_PCIE_ALLREDUCE: ${VLLM_ENABLE_PCIE_ALLREDUCE:-1}
      VLLM_PCIE_ALLREDUCE_BACKEND: b12x
      VLLM_PCIE_ONESHOT_ALLREDUCE_MAX_SIZE: 64KB
      USES_B12X: "True"
      B12X_DENSE_SPLITK_TURBO: "1"
      B12X_W4A16_TC_DECODE: "1"
      B12X_MOE_FORCE_A16: "1"
      VLLM_DCP_GLOBAL_TOPK: "1"
      VLLM_DCP_SHARD_DRAFT: "1"
      VLLM_DCP_GLOBAL_TOPK_PREFILL_ONLY: "0"
      VLLM_DCP_TOPK_FORCE_DEEPGEMM: "0"
      VLLM_CACHE_DIR: /cache/jit/vllm
      TRITON_CACHE_DIR: /cache/jit/triton
      TORCH_EXTENSIONS_DIR: /cache/jit/torch_extensions
      TORCHINDUCTOR_CACHE_DIR: /cache/jit/torchinductor
      FLASHINFER_WORKSPACE_BASE: /cache/jit/flashinfer
      XDG_CACHE_HOME: /cache/jit
      MODEL: ${MODEL:-/models/GLM-5.2-NVFP4}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME:-GLM-5.2-v13-lmcache}
      SERVED_MODEL_NAMES: ${SERVED_MODEL_NAMES:-GLM-5.2-v13-lmcache GLM-5.2-NVFP4}
      PORT: ${PORT:-5318}
      TP_SIZE: ${TP_SIZE:-8}
      DCP_SIZE: ${DCP_SIZE:-4}
      MTP: ${MTP:-1}
      NUM_SPECULATIVE_TOKENS: ${NUM_SPECULATIVE_TOKENS:-3}
      ATTN_BACKEND: ${ATTN_BACKEND:-B12X_MLA_SPARSE}
      ATTENTION_BACKEND: ${ATTN_BACKEND:-B12X_MLA_SPARSE}
      MOE_BACKEND: b12x
      QUANTIZATION: ${QUANTIZATION:-modelopt_fp4}
      KV_CACHE_DTYPE: fp8
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.94}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-1024000}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS:-16}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS:-8192}
      MAX_CUDAGRAPH_CAPTURE_SIZE: ${MAX_CUDAGRAPH_CAPTURE_SIZE:-128}
      GLM52_INDEX_TOPK_PATTERN: FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      # --- LMCache MP connector (same as v13) ---
      GLM52_ENABLE_LMCACHE: "1"
      GLM52_LMCACHE_VERSION: ${GLM52_LMCACHE_VERSION:-0.4.6}
      GLM52_LMCACHE_MP_HOST: ${GLM52_LMCACHE_MP_HOST:-localhost}
      GLM52_LMCACHE_MP_PORT: ${GLM52_LMCACHE_MP_PORT:-5555}
      GLM52_LMCACHE_HTTP_PORT: ${GLM52_LMCACHE_HTTP_PORT:-8088}
      GLM52_LMCACHE_PROMETHEUS_PORT: ${GLM52_LMCACHE_PROMETHEUS_PORT:-9091}
      GLM52_LMCACHE_CHUNK_SIZE: ${GLM52_LMCACHE_CHUNK_SIZE:-1024}
      GLM52_LMCACHE_L1_GB: ${GLM52_LMCACHE_L1_GB:-48}
      GLM52_LMCACHE_L1_INIT_GB: ${GLM52_LMCACHE_L1_INIT_GB:-8}
      GLM52_LMCACHE_L2_GB: ${GLM52_LMCACHE_L2_GB:-2800}
      GLM52_LMCACHE_DISK_PATH: ${GLM52_LMCACHE_DISK_PATH:-/lmcache/l2}
      GLM52_LMCACHE_LOG: ${GLM52_LMCACHE_LOG:-/tmp/lmcache_mp_server.log}
      LMCACHE_SAVE_DECODE_CACHE: "true"
      PYTHONHASHSEED: "0"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "exec /opt/serve_glm52_v12.sh"
